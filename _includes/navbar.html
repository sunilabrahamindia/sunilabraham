<!-- =========================================================
     Sunil Abraham Project
     Refined Navbar Only
     Keeps existing site-header untouched
     No custom width or max-width
     ========================================================= -->

<style>
/* =========================================================
   Navbar only
   ========================================================= */

.navbar {
  position: relative;
  margin: 0 0 1.4rem;
  padding: 0;
  background: linear-gradient(to bottom, #ffffff 0%, #fbfbfc 100%);
  border: 1px solid #e5e7eb;
  border-radius: 18px;
  box-shadow:
    0 1px 2px rgba(17, 24, 39, 0.03),
    0 12px 28px rgba(17, 24, 39, 0.06);
  overflow: hidden;
}

/* thin top sheen */
.navbar::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 1px;
  background: rgba(255, 255, 255, 0.95);
  pointer-events: none;
  z-index: 1;
}

.navbar ul {
  list-style: none;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin: 0;
  padding: 0.75rem;
  position: relative;
  z-index: 2;
}

.navbar li {
  margin: 0;
  padding: 0;
}

.navbar a {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 0.82rem 1.15rem;
  border-radius: 999px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 0.96rem;
  font-weight: 600;
  letter-spacing: 0.01em;
  line-height: 1;
  color: #4b5563;
  text-decoration: none;
  transition:
    color 0.2s ease,
    background-color 0.2s ease,
    box-shadow 0.2s ease,
    transform 0.2s ease;
}

.navbar a:hover {
  color: #111827;
  background: rgba(17, 24, 39, 0.045);
  box-shadow: inset 0 0 0 1px rgba(17, 24, 39, 0.04);
  transform: translateY(-1px);
}

.navbar a:focus {
  outline: 2px solid #111827;
  outline-offset: 3px;
}

.navbar a.active {
  color: #0f4c81;
  background: rgba(15, 76, 129, 0.09);
  box-shadow: inset 0 0 0 1px rgba(15, 76, 129, 0.10);
}

.navbar a.active::after {
  content: "";
  position: absolute;
  left: 1rem;
  right: 1rem;
  bottom: 0.45rem;
  height: 2px;
  border-radius: 999px;
  background: currentColor;
  opacity: 0.9;
}

/* Hide mobile toggle on desktop */
.navbar-toggle {
  display: none;
}

/* =========================================================
   Mobile navbar
   ========================================================= */
@media (max-width: 768px) {
  .navbar {
    margin: 0 0 1rem;
    border-radius: 14px;
  }

  .navbar-toggle {
    display: flex;
    width: 100%;
    min-height: 48px;
    align-items: center;
    justify-content: space-between;
    gap: 0.8rem;
    padding: 0.9rem 1rem;
    background: transparent;
    color: #111827;
    border: none;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 0.96rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
  }

  .navbar-toggle:focus {
    outline: 2px solid #111827;
    outline-offset: -2px;
  }

  .navbar-toggle-label {
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
  }

  .navbar-toggle-icon {
    width: 18px;
    height: 12px;
    position: relative;
    display: inline-block;
    flex: 0 0 auto;
  }

  .navbar-toggle-icon span {
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    border-radius: 999px;
    background: currentColor;
    transition:
      transform 0.2s ease,
      opacity 0.2s ease,
      top 0.2s ease;
  }

  .navbar-toggle-icon span:nth-child(1) { top: 0; }
  .navbar-toggle-icon span:nth-child(2) { top: 5px; }
  .navbar-toggle-icon span:nth-child(3) { top: 10px; }

  .navbar-toggle-caret {
    font-size: 1rem;
    line-height: 1;
    color: #6b7280;
    transition: transform 0.2s ease;
  }

  .navbar-toggle[aria-expanded="true"] .navbar-toggle-icon span:nth-child(1) {
    top: 5px;
    transform: rotate(45deg);
  }

  .navbar-toggle[aria-expanded="true"] .navbar-toggle-icon span:nth-child(2) {
    opacity: 0;
  }

  .navbar-toggle[aria-expanded="true"] .navbar-toggle-icon span:nth-child(3) {
    top: 5px;
    transform: rotate(-45deg);
  }

  .navbar-toggle[aria-expanded="true"] .navbar-toggle-caret {
    transform: rotate(180deg);
  }

  .navbar ul {
    display: none;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    gap: 0.3rem;
    padding: 0 0.75rem 0.75rem;
    border-top: 1px solid #eef0f3;
  }

  .navbar ul.open {
    display: flex;
  }

  .navbar a {
    width: 100%;
    justify-content: flex-start;
    min-height: 46px;
    padding: 0.85rem 1rem;
    border-radius: 12px;
    font-size: 0.94rem;
    transform: none;
  }

  .navbar a:hover {
    transform: none;
  }

  .navbar a.active::after {
    left: 0.9rem;
    right: auto;
    top: 50%;
    bottom: auto;
    width: 0.38rem;
    height: 0.38rem;
    transform: translateY(-50%);
    border-radius: 999px;
  }
}

/* =========================================================
   Reduced motion
   ========================================================= */
@media (prefers-reduced-motion: reduce) {
  .navbar a,
  .navbar-toggle,
  .navbar-toggle-icon span,
  .navbar-toggle-caret {
    transition: none !important;
  }
}
</style>

<nav class="navbar" aria-label="Main navigation">

  <button class="navbar-toggle" aria-expanded="false" aria-controls="navbar-menu" type="button">
    <span class="navbar-toggle-label">
      <span class="navbar-toggle-icon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
      <span>Menu</span>
    </span>
    <span class="navbar-toggle-caret" aria-hidden="true">▾</span>
  </button>

  <ul id="navbar-menu" role="list">
    <li role="listitem"><a href="/" {% if page.url == '/' %}class="active" aria-current="page"{% endif %}>Home</a></li>
    <li role="listitem"><a href="/projects/" {% if page.url contains '/projects/' %}class="active" aria-current="page"{% endif %}>Projects</a></li>
    <li role="listitem"><a href="/publications/" {% if page.url contains '/publications/' %}class="active" aria-current="page"{% endif %}>Publications</a></li>
    <li role="listitem"><a href="/media/" {% if page.url contains '/media/' %}class="active" aria-current="page"{% endif %}>Media mentions</a></li>
    <li role="listitem"><a href="/videos/" {% if page.url contains '/videos/' %}class="active" aria-current="page"{% endif %}>Videos</a></li>
    <li role="listitem"><a href="/contact/" {% if page.url contains '/contact/' %}class="active" aria-current="page"{% endif %}>Contact</a></li>
  </ul>

</nav>

<script>
(function () {
  const toggle = document.querySelector('.navbar-toggle');
  const menu = document.querySelector('#navbar-menu');

  if (!toggle || !menu) return;

  function closeMenu() {
    toggle.setAttribute('aria-expanded', 'false');
    menu.classList.remove('open');
  }

  toggle.addEventListener('click', function () {
    const expanded = toggle.getAttribute('aria-expanded') === 'true';
    toggle.setAttribute('aria-expanded', String(!expanded));
    menu.classList.toggle('open');
  });

  menu.querySelectorAll('a').forEach(function (link) {
    link.addEventListener('click', function () {
      if (window.innerWidth <= 768) closeMenu();
    });
  });

  document.addEventListener('click', function (e) {
    if (window.innerWidth > 768) return;
    if (!toggle.contains(e.target) && !menu.contains(e.target)) {
      closeMenu();
    }
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeMenu();
  });

  window.addEventListener('resize', function () {
    if (window.innerWidth > 768) {
      menu.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });
})();
</script>
