<!-- =========================================================
     Sunil Abraham Project
     Navbar Include
     Refined version of existing navbar only
     No header/footer changes
     ========================================================= -->

<style>
/* =========================================================
   Navbar (Refined Existing Style)
   ========================================================= */
.navbar {
  background:
    linear-gradient(to bottom, #36548f 0%, #2d4376 52%, #263a68 100%);
  border: 1px solid rgba(19, 34, 67, 0.28);
  border-radius: 10px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.10),
    0 4px 12px rgba(0, 0, 0, 0.14);
  margin: 1.2rem 0 0.7rem;
  padding: 0;
  overflow: hidden;
  animation: navbarSlideDown 0.55s ease;
}

.navbar ul {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  align-items: stretch;
  margin: 0;
  padding: 0;
}

.navbar li {
  margin: 0;
  padding: 0;
}

.navbar a {
  position: relative;
  display: inline-flex;
  align-items: center;
  min-height: 48px;
  padding: 0.88rem 1.35rem;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.15;
  color: #f8fbff;
  text-decoration: none;
  letter-spacing: 0.18px;
  border-right: 1px solid rgba(255, 255, 255, 0.10);
  text-shadow: 0 1px 0 rgba(0,0,0,0.10);
  transition:
    background-color 0.22s ease,
    color 0.22s ease,
    transform 0.18s ease,
    box-shadow 0.22s ease;
}

.navbar a::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.10), rgba(255,255,255,0));
  opacity: 0;
  transition: opacity 0.22s ease;
  pointer-events: none;
}

.navbar a:hover {
  background:
    linear-gradient(to bottom, #2b7f84 0%, #22696d 52%, #1d595d 100%);
  color: #ffffff;
  transform: translateY(-1px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
}

.navbar a:hover::before {
  opacity: 1;
}

.navbar a:focus {
  outline: 2px solid rgba(255,255,255,0.95);
  outline-offset: -2px;
}

.navbar a.active {
  background:
    linear-gradient(to bottom, #2f9898 0%, #287e80 55%, #21696b 100%);
  color: #ffffff;
  box-shadow:
    inset 0 2px 6px rgba(0, 0, 0, 0.24),
    inset 0 1px 0 rgba(255,255,255,0.10);
}

.navbar a.active::after {
  content: "";
  position: absolute;
  left: 0.9rem;
  right: 0.9rem;
  bottom: 0.35rem;
  height: 2px;
  border-radius: 999px;
  background: rgba(255,255,255,0.88);
}

.navbar li:last-child a {
  border-right: none;
}

/* Hide mobile toggle on desktop */
.navbar-toggle {
  display: none;
}

@keyframes navbarSlideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* =========================================================
   Mobile Dropdown Navbar
   ========================================================= */
@media (max-width: 768px) {

  .navbar {
    margin: 0.55rem 0 0.9rem;
    border-radius: 8px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.08),
      0 4px 12px rgba(0, 0, 0, 0.12);
  }

  .navbar-toggle {
    display: flex;
    width: 100%;
    min-height: 50px;
    align-items: center;
    justify-content: space-between;
    gap: 0.8rem;
    padding: 0.78rem 1rem;
    background: linear-gradient(to bottom, #5f7fd6 0%, #4867be 100%);
    color: #fff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    text-align: left;
    cursor: pointer;
    letter-spacing: 0.2px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
  }

  .navbar-toggle:hover {
    background: linear-gradient(to bottom, #6988de 0%, #4d6ec7 100%);
  }

  .navbar-toggle:focus {
    outline: 2px solid rgba(255,255,255,0.92);
    outline-offset: -2px;
  }

  .navbar-toggle-label {
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
  }

  .navbar-toggle-icon {
    width: 18px;
    height: 12px;
    position: relative;
    display: inline-block;
    flex: 0 0 auto;
  }

  .navbar-toggle-icon span {
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    border-radius: 999px;
    background: currentColor;
    transition:
      transform 0.2s ease,
      opacity 0.2s ease,
      top 0.2s ease;
  }

  .navbar-toggle-icon span:nth-child(1) { top: 0; }
  .navbar-toggle-icon span:nth-child(2) { top: 5px; }
  .navbar-toggle-icon span:nth-child(3) { top: 10px; }

  .navbar-toggle-caret {
    font-size: 0.95rem;
    line-height: 1;
    transition: transform 0.2s ease;
  }

  .navbar-toggle[aria-expanded="true"] .navbar-toggle-icon span:nth-child(1) {
    top: 5px;
    transform: rotate(45deg);
  }

  .navbar-toggle[aria-expanded="true"] .navbar-toggle-icon span:nth-child(2) {
    opacity: 0;
  }

  .navbar-toggle[aria-expanded="true"] .navbar-toggle-icon span:nth-child(3) {
    top: 5px;
    transform: rotate(-45deg);
  }

  .navbar-toggle[aria-expanded="true"] .navbar-toggle-caret {
    transform: rotate(180deg);
  }

  .navbar ul {
    display: none;
    flex-direction: column;
    background: linear-gradient(to bottom, #89a2eb 0%, #6c88de 100%);
    margin: 0;
    padding: 0;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.3s ease, opacity 0.22s ease;
  }

  .navbar ul.open {
    display: flex;
    max-height: 640px;
    opacity: 1;
    box-shadow: 0 8px 18px rgba(0,0,0,0.14);
  }

  .navbar a {
    width: 100%;
    min-height: 48px;
    padding: 0.82rem 1rem;
    font-size: 0.92rem;
    white-space: normal;
    border-right: none !important;
    border-bottom: 1px solid rgba(255,255,255,0.20);
    margin: 0;
    border-radius: 0;
    transform: none;
    text-shadow: none;
  }

  .navbar a::before {
    display: none;
  }

  .navbar a:hover {
    background: rgba(255,255,255,0.12);
    box-shadow: none;
    transform: none;
  }

  .navbar a:active {
    background: rgba(255,255,255,0.18);
  }

  .navbar a:focus {
    outline: 2px solid rgba(255,255,255,0.75);
    outline-offset: -2px;
  }

  .navbar a.active {
    background: linear-gradient(to bottom, rgba(47,158,158,0.95) 0%, rgba(35,115,115,0.96) 100%);
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.18);
  }

  .navbar a.active::after {
    left: 0.8rem;
    right: auto;
    top: 50%;
    bottom: auto;
    width: 0.38rem;
    height: 0.38rem;
    transform: translateY(-50%);
    border-radius: 999px;
    background: rgba(255,255,255,0.92);
  }

  .navbar li:last-child a {
    border-bottom: none;
  }
}

@media (prefers-reduced-motion: reduce) {
  .navbar,
  .navbar a,
  .navbar ul,
  .navbar-toggle,
  .navbar-toggle-icon span,
  .navbar-toggle-caret {
    animation: none !important;
    transition: none !important;
  }
}
</style>

<nav class="navbar" aria-label="Main navigation">

  <button class="navbar-toggle" aria-expanded="false" aria-controls="navbar-menu" type="button">
    <span class="navbar-toggle-label">
      <span class="navbar-toggle-icon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
      <span>Menu</span>
    </span>
    <span class="navbar-toggle-caret" aria-hidden="true">▾</span>
  </button>

  <ul id="navbar-menu" role="list">
    <li role="listitem"><a href="/" {% if page.url == '/' %}class="active" aria-current="page"{% endif %}>🏠 Home</a></li>
    <li role="listitem"><a href="/projects/" {% if page.url contains '/projects/' %}class="active" aria-current="page"{% endif %}>🧩 Projects</a></li>
    <li role="listitem"><a href="/publications/" {% if page.url contains '/publications/' %}class="active" aria-current="page"{% endif %}>📖 Publications</a></li>
    <li role="listitem"><a href="/media/" {% if page.url contains '/media/' %}class="active" aria-current="page"{% endif %}>📰 Media mentions</a></li>
    <li role="listitem"><a href="/videos/" {% if page.url contains '/videos/' %}class="active" aria-current="page"{% endif %}>▶️ Videos</a></li>
    <li role="listitem"><a href="/contact/" {% if page.url contains '/contact/' %}class="active" aria-current="page"{% endif %}>✉️ Contact</a></li>
  </ul>

</nav>

<script>
(function () {
  const toggle = document.querySelector('.navbar-toggle');
  const menu = document.querySelector('#navbar-menu');

  if (!toggle || !menu) return;

  function closeMenu() {
    toggle.setAttribute('aria-expanded', 'false');
    menu.classList.remove('open');
  }

  toggle.addEventListener('click', () => {
    const expanded = toggle.getAttribute('aria-expanded') === 'true';
    toggle.setAttribute('aria-expanded', String(!expanded));
    menu.classList.toggle('open');
  });

  menu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      if (window.innerWidth <= 768) closeMenu();
    });
  });

  document.addEventListener('click', (e) => {
    if (window.innerWidth > 768) return;
    if (!toggle.contains(e.target) && !menu.contains(e.target)) {
      closeMenu();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeMenu();
  });

  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) {
      menu.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });
})();
</script>
