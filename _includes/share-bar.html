<!-- =========================================================
     TSAP Minimal Utility Bar
     Accessible + Lightweight
     ========================================================= -->

<div id="tsap-topbar">

  <!-- Search -->
  <button id="tsap-search-btn" title="Search this site" aria-label="Search this site">
    🔍
  </button>

  <!-- Share -->
  <button id="tsap-share-btn" title="Share this page" aria-label="Share this page">
    ↗
  </button>

  <!-- RSS -->
  <a href="/feed.xml"
     id="tsap-rss-btn"
     title="RSS Feed"
     aria-label="RSS Feed">
    RSS
  </a>

  <!-- PDF -->
  <button id="tsap-print-btn"
          title="Print or Save as PDF"
          aria-label="Print or Save as PDF">
    PDF
  </button>

</div>

<style>
#tsap-topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9999;

  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;

  padding: 6px 10px;

  background: rgba(248, 250, 252, 0.96);
  backdrop-filter: blur(6px);

  border-bottom: 1px solid #d8dee4;

  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    sans-serif;
}

#tsap-topbar button,
#tsap-topbar a {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  min-width: 38px;
  height: 34px;

  padding: 0 10px;

  border: none;
  border-radius: 8px;

  background: transparent;

  color: #1f2937;
  text-decoration: none;

  font-size: 14px;
  font-weight: 600;

  cursor: pointer;

  transition:
    background 0.2s ease,
    transform 0.15s ease;
}

#tsap-topbar button:hover,
#tsap-topbar a:hover {
  background: rgba(31, 95, 191, 0.10);
}

#tsap-topbar button:focus,
#tsap-topbar a:focus {
  outline: 2px solid #1f5fbf;
  outline-offset: 2px;
}

#tsap-search-form {
  display: flex;
  align-items: center;
  gap: 6px;
}

#tsap-search-input {
  width: 220px;

  padding: 7px 10px;

  border: 1px solid #c7d2da;
  border-radius: 8px;

  font-size: 14px;
}

#tsap-search-input:focus {
  outline: 2px solid #1f5fbf;
  border-color: #1f5fbf;
}

@media (max-width: 768px) {
  body {
    padding-top: 46px !important;
  }

  #tsap-topbar {
    gap: 6px;
    padding: 5px 8px;
  }

  #tsap-topbar button,
  #tsap-topbar a {
    min-width: 34px;
    height: 32px;
    font-size: 13px;
    padding: 0 8px;
  }

  #tsap-search-input {
    width: 150px;
  }
}

@media print {
  #tsap-topbar {
    display: none !important;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {

  /* =====================================================
     SHARE
     ===================================================== */

  document.getElementById('tsap-share-btn')
    .addEventListener('click', async function () {

      const shareData = {
        title: document.title,
        url: window.location.href
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
        } catch (err) {}
      } else {
        try {
          await navigator.clipboard.writeText(window.location.href);
          alert('Link copied to clipboard.');
        } catch (err) {
          prompt('Copy this link:', window.location.href);
        }
      }
    });

  /* =====================================================
     PRINT / PDF
     ===================================================== */

  document.getElementById('tsap-print-btn')
    .addEventListener('click', function () {
      window.print();
    });

  /* =====================================================
     SEARCH
     ===================================================== */

  document.getElementById('tsap-search-btn')
    .addEventListener('click', function () {

      if (document.getElementById('tsap-search-form')) {
        return;
      }

      const form = document.createElement('form');
      form.id = 'tsap-search-form';

      form.action = 'https://www.google.com/search';
      form.method = 'get';

      const hidden = document.createElement('input');
      hidden.type = 'hidden';
      hidden.name = 'q';
      hidden.value = 'site:' + window.location.hostname;

      const input = document.createElement('input');
      input.id = 'tsap-search-input';
      input.type = 'text';
      input.name = 'q';
      input.placeholder = 'Search this site...';

      const close = document.createElement('button');
      close.type = 'button';
      close.innerHTML = '×';

      close.onclick = function () {
        form.remove();
      };

      form.appendChild(hidden);
      form.appendChild(input);
      form.appendChild(close);

      document.getElementById('tsap-topbar')
        .appendChild(form);

      input.focus();

      input.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          form.remove();
        }
      });
    });

});
</script>
