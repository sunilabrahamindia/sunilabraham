<!-- =========================================================
     TSAP Top Utility Bar
     ========================================================= -->

<div id="sc-top-bar">

  <!-- Left: Search -->
  <div id="sc-search-area">
    <form action="https://www.google.com/search" method="get">
      <input
        type="text"
        name="q"
        placeholder=" Search"
        aria-label="Search this site"
      />

      <input
        type="hidden"
        name="q"
        value=""
        id="sc-hidden-search"
      />
    </form>
  </div>

  <!-- Right: Utility Icons -->
  <div id="sc-top-icons">

    <!-- RSS -->
    <a
      href="/feed.xml"
      title="RSS Feed"
      aria-label="RSS Feed"
      class="sc-icon-btn"
    >
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/4/43/Feed-icon.svg"
        alt="RSS Feed"
      />
    </a>

    <!-- PDF / Print -->
    <button
      onclick="window.print()"
      title="Print or Save as PDF"
      aria-label="Print or Save as PDF"
      class="sc-icon-btn"
    >
      <img
        src="https://cdn-icons-png.flaticon.com/128/337/337946.png"
        alt="PDF"
      />
    </button>

    <!-- QR Code -->
    <button
      id="sc-qr-btn"
      title="QR code"
      aria-label="QR code"
      class="sc-icon-btn"
    >
      <img
        src="https://cdn-icons-png.flaticon.com/128/14021/14021433.png"
        alt="QR Code"
      />
    </button>

  </div>

</div>

<!-- =========================================================
     QR Modal
     ========================================================= -->

<div id="sc-qr-modal" aria-hidden="true">

  <div id="sc-qr-box">

    <button id="sc-qr-close" aria-label="Close QR code">
      ×
    </button>

    <h2>QR Code</h2>

    <img
      id="sc-qr-image"
      src=""
      alt="QR code for this page"
    />

    <div id="sc-qr-actions">

      <a
        id="sc-qr-download"
        class="sc-qr-action-btn"
        download="tsap-qr.png"
      >
        Download
      </a>

      <button
        id="sc-qr-share"
        class="sc-qr-action-btn"
        type="button"
      >
        Share
      </button>

    </div>

  </div>

</div>

<style>
/* =========================================================
   TOP BAR
   ========================================================= */

#sc-top-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9999;

  display: flex;
  align-items: center;
  justify-content: space-between;

  gap: 12px;
  padding: 6px 12px;

  background: rgba(248, 250, 252, 0.96);
  backdrop-filter: blur(6px);

  border-bottom: 1px solid rgba(0, 0, 0, 0.08);
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

/* =========================================================
   SEARCH AREA
   ========================================================= */

#sc-search-area {
  flex: 0 1 260px;
  max-width: 260px;
}

#sc-search-area form {
  width: 100%;
}

#sc-search-area input[type="text"] {
  width: 100%;
  height: 32px;

  padding: 0 12px;

  border: 1px solid #cbd5e1;
  border-radius: 8px;

  background: #ffffff;

  font-size: 14px;
  color: #1e293b;

  transition:
    border-color 0.2s ease,
    box-shadow 0.2s ease;
}

#sc-search-area input[type="text"]:focus {
  outline: none;
  border-color: #1f5fbf;
  box-shadow: 0 0 0 3px rgba(31, 95, 191, 0.12);
}

#sc-search-area input[type="text"]::placeholder {
  color: #64748b;
}

/* =========================================================
   RIGHT ICONS
   ========================================================= */

#sc-top-icons {
  display: flex;
  align-items: center;
  gap: 8px;
}

.sc-icon-btn {
  display: flex;
  align-items: center;
  justify-content: center;

  width: 34px;
  height: 34px;

  border: none;
  border-radius: 8px;

  background: transparent;

  cursor: pointer;

  transition:
    background 0.2s ease,
    transform 0.15s ease;
}

.sc-icon-btn:hover {
  background: rgba(31, 95, 191, 0.10);
}

.sc-icon-btn:focus {
  outline: 2px solid #1f5fbf;
  outline-offset: 2px;
}

.sc-icon-btn img {
  width: 20px;
  height: 20px;
  display: block;
}

/* =========================================================
   QR MODAL
   ========================================================= */

#sc-qr-modal {
  position: fixed;
  inset: 0;
  z-index: 10000;

  display: none;
  align-items: center;
  justify-content: center;

  background: rgba(0,0,0,0.45);
}

#sc-qr-box {
  width: min(92vw, 340px);

  background: #ffffff;

  border-radius: 14px;

  padding: 22px 22px 20px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.2);

  position: relative;

  text-align: center;
}

#sc-qr-close {
  position: absolute;
  top: 10px;
  right: 12px;

  border: none;
  background: transparent;

  font-size: 30px;
  line-height: 1;

  cursor: pointer;

  color: #0f172a;
}

#sc-qr-box h2 {
  margin: 0 0 14px;

  font-size: 20px;
  font-weight: 700;

  color: #0f3460;

  text-align: center;
}

#sc-qr-image {
  width: 220px;
  height: 220px;

  max-width: 100%;

  display: block;

  margin: 0 auto;
}

/* =========================================================
   QR ACTIONS
   ========================================================= */

#sc-qr-actions {
  display: flex;
  justify-content: center;
  gap: 10px;

  margin-top: 18px;
}

.sc-qr-action-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  min-width: 110px;
  height: 38px;

  padding: 0 14px;

  border: none;
  border-radius: 8px;

  background: #1f5fbf;
  color: #ffffff;

  text-decoration: none;
  font-size: 14px;
  font-weight: 600;

  cursor: pointer;

  transition:
    background 0.2s ease,
    transform 0.15s ease;
}

.sc-qr-action-btn:hover {
  background: #184c99;
}

.sc-qr-action-btn:focus {
  outline: 2px solid #1f5fbf;
  outline-offset: 2px;
}

/* =========================================================
   DARK MODE
   ========================================================= */

@media (prefers-color-scheme: dark) {

  #sc-top-bar {
    background: rgba(20, 24, 31, 0.96);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 1px 4px rgba(0,0,0,0.35);
  }

  #sc-search-area input[type="text"] {
    background: #1e293b;
    color: #f1f5f9;
    border-color: #334155;
  }

  #sc-search-area input[type="text"]::placeholder {
    color: #94a3b8;
  }

  .sc-icon-btn:hover {
    background: rgba(125, 179, 255, 0.15);
  }

  #sc-qr-box {
    background: #111827;
    color: #f1f5f9;
  }

  #sc-qr-box h2 {
    color: #f8fafc;
  }

  #sc-qr-close {
    color: #f1f5f9;
  }
}

/* =========================================================
   BODY OFFSET
   ========================================================= */

@media (max-width: 768px) {

  body {
    padding-top: 44px !important;
  }

  #sc-top-bar {
    padding: 5px 8px;
    gap: 8px;
  }

  #sc-search-area {
    flex: 0 1 170px;
    max-width: 170px;
  }

  #sc-search-area input[type="text"] {
    height: 30px;
    font-size: 13px;
  }

  .sc-icon-btn {
    width: 32px;
    height: 32px;
  }

  .sc-icon-btn img {
    width: 18px;
    height: 18px;
  }

  #sc-qr-actions {
    flex-direction: column;
  }

  .sc-qr-action-btn {
    width: 100%;
  }
}

@media (min-width: 769px) {

  body {
    padding-top: 44px;
  }
}

/* =========================================================
   PRINT
   ========================================================= */

@media print {

  #sc-top-bar,
  #sc-qr-modal {
    display: none !important;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {

  /* =========================================================
     SEARCH
     ========================================================= */

  const form = document.querySelector('#sc-search-area form');

  form.addEventListener('submit', function () {

    const input = form.querySelector('input[type="text"]');

    document.getElementById('sc-hidden-search').value =
      'site:' + window.location.hostname + ' ' + input.value;
  });

  /* =========================================================
     QR CODE
     ========================================================= */

  const url =
    "{{ site.url }}{{ page.url }}";

  const qrURL =
    'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' +
    encodeURIComponent(url);

  const qrImage =
    document.getElementById('sc-qr-image');

  qrImage.src =
    qrURL;

  document.getElementById('sc-qr-download').href =
    qrURL;

  document.getElementById('sc-qr-btn').onclick =
    function () {

      document.getElementById('sc-qr-modal')
        .style.display = 'flex';
    };

  document.getElementById('sc-qr-close').onclick =
    function () {

      document.getElementById('sc-qr-modal')
        .style.display = 'none';
    };

  /* =========================================================
     SHARE QR
     ========================================================= */

  document.getElementById('sc-qr-share').onclick =
    async function () {

      if (navigator.share) {

        try {

          await navigator.share({
            title: document.title,
            text: 'QR code for this page',
            url: url
          });

        } catch (err) {}
      } else {

        try {

          await navigator.clipboard.writeText(url);

          alert('Page link copied.');

        } catch (err) {}
      }
    };

  /* =========================================================
     BACKDROP CLOSE
     ========================================================= */

  document.getElementById('sc-qr-modal').onclick =
    function (e) {

      if (e.target === this) {
        this.style.display = 'none';
      }
    };

  /* =========================================================
     ESCAPE KEY CLOSE
     ========================================================= */

  document.addEventListener('keydown', function (e) {

    if (e.key === 'Escape') {

      document.getElementById('sc-qr-modal')
        .style.display = 'none';
    }
  });

});
</script>
