<!-- =========================================================
     TSAP Minimal Top Utility Bar
     ========================================================= -->

<div id="sc-top-bar">

  <!-- Right: Search -->
  <div id="sc-search-area">
    <form action="https://www.google.com/search" method="get">
      <input
        type="text"
        name="q"
        placeholder=" Search"
        aria-label="Search this site"
      />

      <input
        type="hidden"
        name="q"
        value=""
        id="sc-hidden-search"
      />
    </form>
  </div>

</div>

<style>
/* =========================================================
   TOP BAR
   ========================================================= */

#sc-top-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9999;

  display: flex;
  align-items: center;
  justify-content: flex-end;

  gap: 12px;
  padding: 6px 12px;

  background: rgba(248, 250, 252, 0.96);
  backdrop-filter: blur(6px);

  border-bottom: 1px solid rgba(0, 0, 0, 0.08);
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

/* =========================================================
   SEARCH AREA
   ========================================================= */

#sc-search-area {
  flex: 0 1 260px;
  width: 100%;
  max-width: 260px;
  min-width: 0;
}

#sc-search-area form {
  width: 100%;
  min-width: 0;
}

#sc-search-area input[type="text"] {
  width: 100%;
  max-width: 100%;
  min-width: 0;
  box-sizing: border-box;
  height: 32px;

  padding: 0 12px;

  border: 1px solid #cbd5e1;
  border-radius: 8px;

  background: #ffffff;

  font-size: 14px;
  color: #1e293b;

  transition:
    border-color 0.2s ease,
    box-shadow 0.2s ease;
}

#sc-search-area input[type="text"]:focus {
  outline: none;
  border-color: #1f5fbf;
  box-shadow: 0 0 0 3px rgba(31, 95, 191, 0.12);
}

#sc-search-area input[type="text"]::placeholder {
  color: #64748b;
}

/* =========================================================
   DARK MODE
   ========================================================= */

@media (prefers-color-scheme: dark) {

  #sc-top-bar {
    background: rgba(20, 24, 31, 0.96);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 1px 4px rgba(0,0,0,0.35);
  }

  #sc-search-area input[type="text"] {
    background: #1e293b;
    color: #f1f5f9;
    border-color: #334155;
  }

  #sc-search-area input[type="text"]::placeholder {
    color: #94a3b8;
  }
}

/* =========================================================
   BODY OFFSET
   ========================================================= */

@media (max-width: 768px) {

  body {
    padding-top: 44px !important;
  }

  #sc-top-bar {
    padding: 5px 8px;
    gap: 8px;
  }

  #sc-search-area {
    flex: 0 1 170px;
    width: 100%;
    max-width: 170px;
    min-width: 0;
  }

  #sc-search-area input[type="text"] {
    height: 30px;
    font-size: 13px;
  }
}

@media (min-width: 769px) {

  body {
    padding-top: 44px;
  }
}

/* =========================================================
   PRINT
   ========================================================= */

@media print {

  #sc-top-bar {
    display: none !important;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {

  const form = document.querySelector('#sc-search-area form');

  form.addEventListener('submit', function () {

    const input = form.querySelector('input[type="text"]');

    document.getElementById('sc-hidden-search').value =
      'site:' + window.location.hostname + ' ' + input.value;
  });

});
</script>
