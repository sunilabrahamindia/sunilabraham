name: Update pages index

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-pages-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate pages.json
        run: python scripts/generate_pages_json.py

      - name: Commit updated pages.json
        run: |
          if git diff --quiet pages.json; then
            echo "No changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pages.json
            git commit -m "Update pages index"
            git push
          fi